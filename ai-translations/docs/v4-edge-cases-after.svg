<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 806" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="o" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="806" rx="10" fill="#ffffff"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#0f172a">After — v4</text>
  <text x="30" y="48" fill="#64748b">Every field is checked before it is written. Bad values are withheld and reported; runs resume.</text>

  <!-- A plan -->
  <rect x="150" y="64" width="300" height="44" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="300" y="91" text-anchor="middle" fill="#1e293b">Plan · sidebar + bulk share one engine</text>

  <!-- B translate -->
  <rect x="150" y="132" width="300" height="44" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="300" y="159" text-anchor="middle" fill="#1e293b">Translate field</text>
  <!-- rate limit side note -->
  <rect x="488" y="132" width="252" height="44" rx="7" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="614" y="153" text-anchor="middle" fill="#075985">429 → auto-retry</text>
  <text x="614" y="169" text-anchor="middle" fill="#075985">(Retry-After / backoff)</text>

  <!-- C QC -->
  <rect x="110" y="200" width="380" height="54" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="300" y="222" text-anchor="middle" fill="#1e293b">QC checks — structure · length · placeholders ·</text>
  <text x="300" y="240" text-anchor="middle" fill="#1e293b">locale · no-op · truncation · block ids</text>

  <!-- D gate -->
  <polygon points="300,282 404,330 300,378 196,330" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="300" y="334" text-anchor="middle" fill="#1e293b">Any error-tier problem?</text>

  <!-- E1 withhold -->
  <rect x="500" y="302" width="240" height="56" rx="7" fill="#ffedd5" stroke="#ea580c"/>
  <text x="620" y="325" text-anchor="middle" fill="#9a3412">Withhold value ·</text>
  <text x="620" y="341" text-anchor="middle" fill="#9a3412">report field + locale reason</text>

  <!-- E2 write -->
  <rect x="150" y="404" width="300" height="46" rx="7" fill="#dcfce7" stroke="#16a34a"/>
  <text x="300" y="432" text-anchor="middle" fill="#14532d">Write value (+ warnings attached)</text>

  <!-- F report -->
  <rect x="90" y="486" width="580" height="54" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="380" y="508" text-anchor="middle" fill="#1e293b">Per-record report</text>
  <text x="380" y="526" text-anchor="middle" fill="#1e293b">Copy / Export: Plaintext · CSV · JSON (+ machine token)</text>

  <!-- G checkpoint -->
  <rect x="180" y="568" width="400" height="44" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="380" y="595" text-anchor="middle" fill="#1e293b">Checkpoint run state → IndexedDB</text>

  <!-- H interrupted -->
  <polygon points="380,636 500,682 380,728 260,682" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="380" y="686" text-anchor="middle" fill="#1e293b">Interrupted / config changed?</text>

  <!-- H1 resume -->
  <rect x="558" y="654" width="188" height="56" rx="7" fill="#dcfce7" stroke="#16a34a"/>
  <text x="652" y="677" text-anchor="middle" fill="#14532d">Resume only</text>
  <text x="652" y="693" text-anchor="middle" fill="#14532d">unfinished (policy-guarded)</text>

  <!-- arrows -->
  <path d="M300,108 V130" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M450,154 H486" stroke="#0284c7" fill="none" stroke-dasharray="4 3"/>
  <path d="M300,176 V198" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M300,254 V280" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M404,330 H498" stroke="#ea580c" fill="none" marker-end="url(#o)"/>
  <text x="452" y="324" text-anchor="middle" fill="#ea580c">yes</text>
  <path d="M300,378 V402" stroke="#16a34a" fill="none" marker-end="url(#g)"/>
  <text x="315" y="396" fill="#16a34a">no</text>
  <path d="M300,450 V486" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M620,358 V486" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M380,540 V566" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M380,612 V634" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M500,682 H556" stroke="#16a34a" fill="none" marker-end="url(#g)"/>
  <text x="528" y="676" text-anchor="middle" fill="#16a34a">yes</text>

  <!-- H2 complete -->
  <rect x="250" y="748" width="260" height="42" rx="7" fill="#f1f5f9" stroke="#64748b"/>
  <text x="380" y="774" text-anchor="middle" fill="#334155">Run complete · full report kept</text>
  <path d="M380,728 V746" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <text x="395" y="742" fill="#64748b">no</text>
</svg>
