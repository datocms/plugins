<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 590" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="590" rx="10" fill="#ffffff"/>
  <text x="30" y="30" font-size="15" font-weight="700" fill="#0f172a">Before — master 3.7.0</text>
  <text x="30" y="48" fill="#64748b">A field either saves, or fails silently. No verification, no report, no recovery.</text>

  <!-- A translate -->
  <rect x="150" y="66" width="300" height="46" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="300" y="94" text-anchor="middle" fill="#1e293b">Translate field (provider call)</text>

  <!-- B decision parses -->
  <polygon points="300,128 392,169 300,210 208,169" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="300" y="173" text-anchor="middle" fill="#1e293b">Output parses?</text>

  <!-- B fail -->
  <rect x="520" y="145" width="215" height="48" rx="7" fill="#fee2e2" stroke="#dc2626"/>
  <text x="627" y="166" text-anchor="middle" fill="#991b1b">Whole field fails —</text>
  <text x="627" y="182" text-anchor="middle" fill="#991b1b">user retries by hand ×3–4</text>

  <!-- C write -->
  <rect x="150" y="238" width="300" height="46" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="300" y="266" text-anchor="middle" fill="#1e293b">Write to CMA (no verification)</text>

  <!-- D decision over limit -->
  <polygon points="300,300 392,341 300,382 208,341" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="300" y="345" text-anchor="middle" fill="#1e293b">Over limit / broken?</text>

  <!-- D fail -->
  <rect x="520" y="317" width="215" height="48" rx="7" fill="#fee2e2" stroke="#dc2626"/>
  <text x="627" y="338" text-anchor="middle" fill="#991b1b">Silently truncated / 422 —</text>
  <text x="627" y="354" text-anchor="middle" fill="#991b1b">record corrupted</text>

  <!-- E saved -->
  <rect x="150" y="410" width="300" height="46" rx="7" fill="#eef2ff" stroke="#6366f1"/>
  <text x="300" y="438" text-anchor="middle" fill="#1e293b">Saved — unverified</text>

  <!-- F banner -->
  <rect x="110" y="500" width="380" height="48" rx="7" fill="#fee2e2" stroke="#dc2626"/>
  <text x="300" y="521" text-anchor="middle" fill="#991b1b">No failure report ·</text>
  <text x="300" y="537" text-anchor="middle" fill="#991b1b">interruption loses all progress</text>

  <!-- arrows -->
  <path d="M300,112 V126" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M392,169 H518" stroke="#dc2626" fill="none" marker-end="url(#r)"/>
  <text x="455" y="163" text-anchor="middle" fill="#dc2626">no</text>
  <path d="M627,145 V96 H452" stroke="#dc2626" fill="none" stroke-dasharray="4 3" marker-end="url(#r)"/>
  <text x="500" y="90" text-anchor="middle" fill="#dc2626">loop</text>
  <path d="M300,210 V236" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <text x="315" y="228" fill="#64748b">yes</text>
  <path d="M300,284 V298" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <path d="M392,341 H518" stroke="#dc2626" fill="none" marker-end="url(#r)"/>
  <text x="455" y="335" text-anchor="middle" fill="#dc2626">yes</text>
  <path d="M300,382 V408" stroke="#64748b" fill="none" marker-end="url(#a)"/>
  <text x="315" y="400" fill="#64748b">no</text>
  <path d="M300,456 V498" stroke="#64748b" fill="none" marker-end="url(#a)"/>
</svg>
